name: Kart hazırla (onaya sun)
on:
  workflow_dispatch: {}
permissions:
  contents: write
concurrency:
  group: bot
  cancel-in-progress: false
jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Fontlar
        run: sudo apt-get update && sudo apt-get install -y fonts-ebgaramond fonts-noto-core
      - name: Bağımlılıklar
        run: |
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium
      - name: Git kimliği
        run: |
          git config user.name "muhtesem-bot"
          git config user.email "actions@users.noreply.github.com"
      - name: Hazırla
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot.py prepare
