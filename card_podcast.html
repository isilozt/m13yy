<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<style>
  :root{ /*THEME*/ }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:1080px;height:1350px}
  body{position:relative;overflow:hidden;background:var(--bg);
    font-family:"EB Garamond",Garamond,serif;color:var(--ink)}
  .lattice{position:absolute;inset:0;background-image:url("GIRIH_TILE");
    background-size:150px 150px;opacity:var(--girih-op);pointer-events:none}
  .frame{position:absolute;inset:56px;border:1px solid var(--frame);pointer-events:none}
  .frame::before{content:"";position:absolute;inset:9px;border:1px solid var(--frame-inner)}
  .stage{position:absolute;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:space-between;padding:96px 108px;text-align:center}
  .head{display:flex;flex-direction:column;align-items:center;gap:16px}
  .dinle{width:52px;height:52px}
  .podcast{font-family:"Noto Sans",system-ui,sans-serif;font-size:21px;font-weight:700;
    letter-spacing:.28em;text-transform:uppercase;color:var(--accent);padding-left:.28em}
  .info{font-style:normal;font-weight:500;font-size:QUOTE_SIZEpx;line-height:1.4;
    max-width:840px;text-wrap:pretty}
  .foot{display:flex;flex-direction:column;align-items:center;gap:16px}
  .rule{display:flex;align-items:center;gap:16px;color:var(--accent)}
  .rule .line{width:70px;height:1px;background:currentColor;opacity:.6}
  .rule .dot{width:6px;height:6px;transform:rotate(45deg);border:1px solid currentColor}
  .icons{display:flex;align-items:center;gap:20px} .icons svg{height:32px;width:auto;display:block}
  .bolum{font-family:"Noto Sans",system-ui,sans-serif;font-size:30px;line-height:1.4;
    color:var(--ink);font-weight:600;max-width:820px}
  .bolum .lbl{color:var(--accent);font-weight:700}
  .logo{margin-top:4px} .logo img{width:280px;height:auto;display:block;opacity:.96}
</style>
</head>
<body>
  <div class="lattice"></div>
  <div class="frame"></div>
  <div class="stage">
    <div class="head">
      <svg class="dinle" viewBox="0 0 48 48" aria-hidden="true">
        <path d="M9 30 V25 a15 15 0 0 1 30 0 V30" fill="none" stroke="var(--accent)" stroke-width="2.6" stroke-linecap="round"/>
        <rect x="6" y="28" width="9" height="14" rx="4.5" fill="var(--accent)"/>
        <rect x="33" y="28" width="9" height="14" rx="4.5" fill="var(--accent)"/>
      </svg>
      <div class="podcast">Muhteşem 13. Yüzyıl Podcast</div>
    </div>
    <div class="info">{{METIN}}</div>
    <div class="foot">
      <div class="rule"><span class="line"></span><span class="dot"></span><span class="line"></span></div>
      <div class="icons">
        <svg viewBox="0 0 34 34"><circle cx="17" cy="17" r="16" fill="var(--accent)"/><path d="M8 13c6-2 12-1 17 2" fill="none" stroke="var(--solid)" stroke-width="2.3" stroke-linecap="round"/><path d="M9 18c5-1.6 10-.8 14 1.6" fill="none" stroke="var(--solid)" stroke-width="2.1" stroke-linecap="round"/><path d="M10 22.5c4-1.2 8-.6 11 1.3" fill="none" stroke="var(--solid)" stroke-width="1.9" stroke-linecap="round"/></svg>
        <svg viewBox="0 0 46 32"><rect x="1" y="1" width="44" height="30" rx="9" fill="var(--accent)"/><path d="M19 10 L31 16 L19 22 Z" fill="var(--solid)"/></svg>
      </div>
      <div class="bolum"><span class="lbl">Bölüm:</span> {{BOLUM}}</div>
      <div class="logo"><img src="LOGO_SRC" alt="MUHTEŞEM 13.yüzyıl"></div>
    </div>
  </div>
</body>
</html>
