name: Token yenile
on:
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch: {}
jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests pynacl
      - name: Token yenile
        env:
          IG_TOKEN: ${{ secrets.IG_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: python refresh_token.py
