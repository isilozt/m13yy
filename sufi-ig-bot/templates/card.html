<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<style>
  :root{
    /*THEME*/
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:1080px;height:1350px}
  body{
    position:relative;overflow:hidden;
    background:var(--bg);
    font-family:"EB Garamond",Garamond,serif;
    color:var(--ink);
  }
  .lattice{
    position:absolute;inset:0;
    background-image:url("GIRIH_TILE");
    background-size:150px 150px;
    opacity:var(--girih-op);pointer-events:none;
  }
  .frame{
    position:absolute;inset:56px;
    border:1px solid var(--frame);pointer-events:none;
  }
  .frame::before{
    content:"";position:absolute;inset:9px;
    border:1px solid var(--frame-inner);
  }
  .stage{
    position:absolute;inset:0;
    display:flex;flex-direction:column;
    align-items:center;justify-content:space-between;
    padding:132px 116px;text-align:center;
  }
  .head{display:flex;flex-direction:column;align-items:center;gap:34px}
  .seal{width:62px;height:62px}
  .seal rect,.seal circle{stroke:var(--accent);stroke-width:1.4;fill:none}
  .theme{
    font-family:"Noto Sans",system-ui,sans-serif;
    font-size:23px;font-weight:600;letter-spacing:.44em;
    text-transform:uppercase;color:var(--muted);padding-left:.44em;
  }
  .theme:empty{display:none}
  .quote{
    font-style:italic;font-weight:500;
    font-size:QUOTE_SIZEpx;line-height:1.34;
    max-width:820px;text-wrap:balance;letter-spacing:.004em;
  }
  .quote .lead{color:var(--accent);font-style:normal;margin-right:.05em}
  .foot{display:flex;flex-direction:column;align-items:center;gap:30px}
  .rule{display:flex;align-items:center;gap:16px;color:var(--accent)}
  .rule .line{width:78px;height:1px;background:currentColor;opacity:.6}
  .rule .dot{width:6px;height:6px;transform:rotate(45deg);border:1px solid currentColor}
  .kunye{display:flex;flex-direction:column;gap:10px}
  .author{
    font-family:"Noto Sans",system-ui,sans-serif;
    font-size:27px;font-weight:600;letter-spacing:.24em;
    text-transform:uppercase;color:var(--ink);padding-left:.24em;
  }
  .work{font-style:italic;font-size:30px;color:var(--muted)}
  .logo{margin-top:30px}
  .logo img{width:360px;height:auto;display:block;opacity:.96;filter:var(--logo-filter)}
</style>
</head>
<body>
  <div class="lattice"></div>
  <div class="frame"></div>
  <div class="stage">
    <div class="head">
      <svg class="seal" viewBox="0 0 40 40" aria-hidden="true">
        <rect x="8" y="8" width="24" height="24"/>
        <rect x="8" y="8" width="24" height="24" transform="rotate(45 20 20)"/>
        <circle cx="20" cy="20" r="4.5"/>
      </svg>
    </div>
    <blockquote class="quote"><span class="lead">&ldquo;</span>{{QUOTE}}</blockquote>
    <div class="foot">
      <div class="rule"><span class="line"></span><span class="dot"></span><span class="line"></span></div>
      <div class="kunye">
        <div class="author">{{AUTHOR}}</div>
        <div class="work">{{WORK}}</div>
      </div>
      <div class="logo"><img src="LOGO_SRC" alt="MUHTEŞEM 13.yüzyıl"></div>
    </div>
  </div>
</body>
</html>
